{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">Salesform</h2>

<div class="card p-4">

<form method="POST">
   {% csrf_token %}

   <!-- Customer -->
   <div class="mb-3">
       <label class="form-label">Customer Name</label>
       <input name="customer_name" class="form-control" required>
   </div>

   <!-- Customer Type -->
   <div class="mb-3">
       <label class="form-label">Customer Type</label>
       <select name="customer_type" class="form-control">
           <option value="retail">Retail</option>
           <option value="wholesale">Wholesale</option>
       </select>
   </div>

   <!-- Product -->
   <div class="mb-3">
       <label class="form-label">Product</label>
       <select name="product" class="form-control">
           {% for p in products %}
               <option value="{{ p.id }}"
                   {% if selected_product and selected_product.id == p.id %}selected{% endif %}>
                   {{ p.product_name }}
               </option>
           {% endfor %}
       </select>
   </div>

   <!-- Unit Price (from backend) -->
   <div class="mb-3">
       <label class="form-label">Unit Price</label>
       <input class="form-control" 
              value="{% if selected_product %}{{ selected_product.unit_price }}{% endif %}" 
              readonly>
   </div>

   <!-- Quantity -->
   <div class="mb-3">
       <label class="form-label">Quantity</label>
       <input name="quantity" class="form-control" required>
   </div>

   <!-- Transport -->
   <div class="mb-3 form-check">
       <input type="checkbox" name="transport_required" class="form-check-input">
       <label class="form-check-label">Transport Required</label>
   </div>

   <div class="mb-3">
       <label class="form-label">Distance (km)</label>
       <input name="distance_km" class="form-control">
   </div>

   <button class="btn btn-success">Save Sale</button>

</form>

</div>

{% endblock %}
