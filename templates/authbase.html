<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Authentication{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* ================= BACKGROUND ================= */
        body.auth-body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
        }

        /* ================= NAVBAR ================= */
        .auth-navbar {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
        }

        .auth-navbar .brand {
            color: #22c55e;
            font-weight: 600;
        }

        /* ================= SMALL LOGO ================= */
        .auth-logo-sm {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        /* ================= MAIN ================= */
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 70px);
            padding: 20px;
        }

        /* ================= BIG LOGO ================= */
        .auth-logo {
            width: 100px;
            height: auto;
            object-fit: contain;
        }

        /* ================= BRAND TEXT ================= */
        .auth-title {
            color: white;
            font-weight: 600;
        }

        .auth-subtitle {
            color: #cbd5e1;
            font-size: 14px;
        }

        /* ================= CARD ================= */
        .auth-card {
            background: white;
            color: #1e293b;
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* ================= FORM ================= */
        .form-control {
            border-radius: 8px;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 5px rgba(37,99,235,0.3);
        }

        /* ================= BUTTON ================= */
        .btn-auth {
            background: #16a34a;
            border: none;
            border-radius: 8px;
            width: 100%;
        }

        .btn-auth:hover {
            background: #15803d;
        }

        /* ================= LINKS ================= */
        .auth-links {
            font-size: 13px;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 500px) {
            .auth-card {
                padding: 20px;
            }
        }

    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="auth-body">

    <!-- NAVBAR -->
    <nav class="navbar auth-navbar d-flex justify-content-between">

        <div class="d-flex align-items-center gap-2">
            <!-- Replace src with your actual logo path -->
            <img src="/static/images/logo.png" class="auth-logo-sm" alt="Logo">
            <span class="brand">Nyondo Hardware</span>
        </div>

        <div>
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">
                Login
            </a>
            <a href="{% url 'register' %}" class="btn btn-warning btn-sm">
                Register
            </a>
        </div>

    </nav>


    <!-- MAIN -->
    <div class="auth-container">

        <!-- LOGO + BRAND -->
        <div class="text-center mb-4">
            <img src="/static/images/logo.png" class="auth-logo" alt="Logo">

            <h4 class="auth-title mt-3">
                Nyondo General Hardware Ltd
            </h4>

            <p class="auth-subtitle">
                Inventory & Sales Management System
            </p>
        </div>

        <!-- CARD -->
        <div class="auth-card">
            {% block content %}
            {% endblock %}
        </div>

    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}

</body>

</html>
